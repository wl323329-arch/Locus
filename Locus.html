<script>
(function () {
  const TOKEN = { NUM: 'NUM', ID: 'ID', OP: 'OP', LP: 'LP', RP: 'RP', COMMA: 'COMMA', END: 'END' };
  function tokenize(src) {
    const t = []; let i = 0;
    while (i < src.length) {
      const c = src[i];
      if (/\s/.test(c)) { i++; continue; }
      if (/[0-9.]/.test(c)) {
        let j = i;
        while (j < src.length && /[0-9.]/.test(src[j])) j++;
        if (src[j] === 'e' || src[j] === 'E') {
          j++; if (src[j] === '+' || src[j] === '-') j++;
          while (j < src.length && /[0-9]/.test(src[j])) j++;
        }
        t.push({ k: TOKEN.NUM, v: parseFloat(src.slice(i, j)) }); i = j; continue;
      }
      if (/[A-Za-z_]/.test(c)) {
        let j = i;
        while (j < src.length && /[A-Za-z_0-9]/.test(src[j])) j++;
        t.push({ k: TOKEN.ID, v: src.slice(i, j) }); i = j; continue;
      }
      if ('+-*/^%'.includes(c)) { t.push({ k: TOKEN.OP, v: c }); i++; continue; }
      if (c === '(') { t.push({ k: TOKEN.LP }); i++; continue; }
      if (c === ')') { t.push({ k: TOKEN.RP }); i++; continue; }
      if (c === ',') { t.push({ k: TOKEN.COMMA }); i++; continue; }
      if (c === '=') { t.push({ k: TOKEN.OP, v: '=' }); i++; continue; }
      throw new Error('Unexpected character: ' + c);
    }
    t.push({ k: TOKEN.END }); return t;
  }
  function parse(src) {
    const tokens = tokenize(src); let p = 0;
    const peek = () => tokens[p];
    const eat = (k) => { const t = tokens[p]; if (t.k !== k) throw new Error('Unexpected token'); p++; return t; };
    function expr() { return addsub(); }
    function addsub() {
      let left = muldiv();
      while (peek().k === TOKEN.OP && (peek().v === '+' || peek().v === '-')) {
        const op = tokens[p++].v; const right = muldiv(); left = { op, left, right };
      }
      return left;
    }
    function muldiv() {
      let left = unary();
      while (peek().k === TOKEN.OP && (peek().v === '*' || peek().v === '/' || peek().v === '%')) {
        const op = tokens[p++].v; const right = unary(); left = { op, left, right };
      }
      while (peek().k === TOKEN.ID || peek().k === TOKEN.LP || peek().k === TOKEN.NUM) {
        const right = unary(); left = { op: '*', left, right };
      }
      return left;
    }
    function unary() {
      if (peek().k === TOKEN.OP && peek().v === '-') { p++; return { op: 'neg', arg: unary() }; }
      if (peek().k === TOKEN.OP && peek().v === '+') { p++; return unary(); }
      return pow();
    }
    function pow() {
      const base = atom();
      if (peek().k === TOKEN.OP && peek().v === '^') { p++; const exp = unary(); return { op: '^', left: base, right: exp }; }
      return base;
    }
    function atom() {
      const t = peek();
      if (t.k === TOKEN.NUM) { p++; return { num: t.v }; }
      if (t.k === TOKEN.LP) { p++; const e = expr(); eat(TOKEN.RP); return e; }
      if (t.k === TOKEN.ID) {
        p++;
        if (peek().k === TOKEN.LP) {
          p++; const args = [];
          if (peek().k !== TOKEN.RP) { args.push(expr()); while (peek().k === TOKEN.COMMA) { p++; args.push(expr()); } }
          eat(TOKEN.RP); return { call: t.v, args };
        }
        return { id: t.v };
      }
      throw new Error('Unexpected token');
    }
    let lhsEnd = -1;
    for (let i = 0; i < Math.min(tokens.length, 8); i++) {
      if (tokens[i].k === TOKEN.OP && tokens[i].v === '=') { lhsEnd = i; break; }
    }
    if (lhsEnd >= 0) p = lhsEnd + 1;
    const tree = expr();
    if (peek().k !== TOKEN.END) throw new Error('Trailing tokens');
    return tree;
  }
  function evalNode(node, scope) {
    if (node.num !== undefined) return node.num;
    if (node.id !== undefined) {
      if (node.id in scope) return scope[node.id];
      if (node.id in Math) return Math[node.id];
      throw new Error('Unknown: ' + node.id);
    }
    if (node.call !== undefined) {
      const fn = scope[node.call] || Math[node.call];
      if (typeof fn !== 'function') throw new Error('Not a function: ' + node.call);
      return fn(...node.args.map(a => evalNode(a, scope)));
    }
    if (node.op === 'neg') return -evalNode(node.arg, scope);
    const L = evalNode(node.left, scope); const R = evalNode(node.right, scope);
    switch (node.op) {
      case '+': return L + R; case '-': return L - R;
      case '*': return L * R; case '/': return L / R;
      case '%': return L % R; case '^': return Math.pow(L, R);
    }
    throw new Error('Bad op: ' + node.op);
  }
  const EXTRA = {
    ln: Math.log, log: (x, b) => b === undefined ? Math.log10(x) : Math.log(x) / Math.log(b),
    sec: x => 1 / Math.cos(x), csc: x => 1 / Math.sin(x), cot: x => 1 / Math.tan(x),
    pi: Math.PI, e: Math.E, tau: 2 * Math.PI,
  };
  window.LocusMath = {
    parse,
    compile(src) {
      const tree = parse(src);
      return (x, vars = {}) => evalNode(tree, { x, ...EXTRA, ...vars });
    },
  };
})();

    funcPalette: ['oklch(65% 0.20 30)', 'oklch(65% 0.18 140)', 'oklch(65% 0.18 260)', 'oklch(65% 0.20 340)', 'oklch(70% 0.17 90)', 'oklch(65% 0.18 200)'],
  },
};

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "linen"
}/*EDITMODE-END*/;

const { useState, useEffect, useRef, useMemo, useCallback } = React;

const RAIL_WIDTH = 48;

const TrashIcon = () => (

    <path d="M2.5 3.5h8M5 3.5V2.5a1 1 0 011-1h1a1 1 0 011 1v1M3.5 3.5v7a1 1 0 001 1h4a1 1 0 001-1v-7M5.5 5.5v4M7.5 5.5v4"/>

);
const ChevronLeft = () => (
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M7.5 2.5L4 6l3.5 3.5"/>

);
const ChevronRight = () => (
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
    <path d="M4.5 2.5L8 6l-3.5 3.5"/>
  </svg>
);
const LocusMark = ({ color }) => (
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={color} strokeWidth="1.3" strokeLinecap="round">
    <circle cx="15" cy="15" r="1.5" fill={color} stroke="none"/>
    <path d="M3 15a12 12 0 0112-12"/>
    <path d="M6 15a9 9 0 019-9"/>
    <path d="M9 15a6 6 0 016-6"/>
  </svg>
);

const COORD_MODES = {
  exact: 'exact',
  decimal: 'decimal',
};

function gcd(a, b) {
  a = Math.abs(a); b = Math.abs(b);
  while (b) [a, b] = [b, a % b];
  return a || 1;
}

function trimDecimal(text) {
  return text.replace(/(\.\d*?[1-9])0+$/u, '$1').replace(/\.0+$/u, '');
}

function formatDecimalNumber(value) {
  if (Math.abs(value) < 1e-10) return '0';
  const abs = Math.abs(value);
  if (abs >= 1e5 || abs < 1e-4) return value.toExponential(3).replace('+', '');
  return trimDecimal(value.toFixed(abs < 1 ? 4 : 3));
}

function bestFraction(value, maxDen = 64) {
  let best = { num: Math.round(value), den: 1, err: Math.abs(value - Math.round(value)) };
  for (let den = 1; den <= maxDen; den++) {
    const num = Math.round(value * den);
    const err = Math.abs(value - num / den);
    if (err < best.err) best = { num, den, err };
  }
  const factor = gcd(best.num, best.den);
  return { num: best.num / factor, den: best.den / factor, err: best.err };
}

function formatFraction(num, den, suffix = '') {
  if (num === 0) return '0';
  const sign = num < 0 ? '-' : '';
  const absNum = Math.abs(num);
  if (suffix) {
    if (den === 1 && absNum === 1) return `${sign}${suffix}`;
    if (den === 1) return `${sign}${absNum}${suffix}`;
    if (absNum === 1) return `${sign}${suffix}/${den}`;
    return `${sign}${absNum}${suffix}/${den}`;
  }
  return den === 1 ? `${num}` : `${num}/${den}`;
}

function isSquareFree(n) {
  for (let factor = 2; factor * factor <= n; factor++) {
    if (n % (factor * factor) === 0) return false;
  }
  return true;
}

function bestRadicalFraction(value, maxCoeff = 12, maxDen = 24, maxRad = 24) {
  let best = null;
  const abs = Math.abs(value);
  for (let rad = 2; rad <= maxRad; rad++) {
    if (!isSquareFree(rad)) continue;
    const root = Math.sqrt(rad);
    for (let den = 1; den <= maxDen; den++) {
      for (let coeff = 1; coeff <= maxCoeff; coeff++) {
        const candidate = coeff * root / den;
        const err = Math.abs(abs - candidate);
        if (!best || err < best.err) best = { coeff, den, rad, err };
      }
    }
  }
  return best;
}

function formatRadicalFraction(value, coeff, den, rad) {
  const sign = value < 0 ? '-' : '';
  const factor = gcd(coeff, den);
  const reducedCoeff = coeff / factor;
  const reducedDen = den / factor;
  const radical = reducedCoeff === 1 ? `√${rad}` : `${reducedCoeff}√${rad}`;
  return reducedDen === 1 ? `${sign}${radical}` : `${sign}${radical}/${reducedDen}`;
}

function formatExactNumber(value) {
  if (Math.abs(value) < 1e-10) return '0';
  const constants = [
    { base: Math.PI, symbol: 'π' },
    { base: Math.E, symbol: 'e' },
  ];
  for (const { base, symbol } of constants) {
    const ratio = value / base;
    const frac = bestFraction(ratio, 24);
    const tolerance = Math.max(1e-6, Math.abs(value) * 2e-4);
    if (frac.err * Math.abs(base) < tolerance) return formatFraction(frac.num, frac.den, symbol);
  }
  const radical = bestRadicalFraction(value);
  const radicalTolerance = Math.max(1e-6, Math.abs(value) * 2e-4);
  if (radical && radical.err < radicalTolerance) {
    return formatRadicalFraction(value, radical.coeff, radical.den, radical.rad);
  }
  const frac = bestFraction(value, 96);
  return formatFraction(frac.num, frac.den);
}

function formatCoordinateValue(value, mode) {
  return mode === COORD_MODES.exact ? formatExactNumber(value) : formatDecimalNumber(value);
}

function formatPointLabel(x, y, mode) {
  return `(${formatCoordinateValue(x, mode)}, ${formatCoordinateValue(y, mode)})`;
}

function getPointKey(point) {
  const ids = [point.fnId, point.fn2Id].filter(Boolean).sort().join('|');
  return `${point.type}:${point.x.toFixed(6)}:${point.y.toFixed(6)}:${ids}`;
}

const FUNC_SUBSCRIPTS = ['₀','₁','₂','₃','₄','₅','₆','₇','₈','₉'];
const EXPR_FUNCTION_NAMES = new Set(['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'exp', 'ln', 'log', 'sqrt', 'abs', 'pow', 'sec', 'csc', 'cot']);
const EXPR_CONSTANT_NAMES = new Set(['pi', 'e', 'tau']);

function formatFnLabel(seq) {
  const n = Number.isFinite(seq) ? seq + 1 : 1;
  return 'f' + String(n).split('').map(d => FUNC_SUBSCRIPTS[+d] || d).join('');
}

function renderExpressionPreview(expr) {
  if (!expr) return null;
  const tokens = [];
  const pattern = /\s+|[A-Za-z_][A-Za-z0-9_]*|\d+(?:\.\d+)?|./gu;
  let match;
  let index = 0;
  while ((match = pattern.exec(expr))) {
    const text = match[0];
    let className = '';
    if (/^\s+$/u.test(text)) {
      className = '';
    } else if (EXPR_FUNCTION_NAMES.has(text)) {
      className = 'expr-token-fn';
    } else if (EXPR_CONSTANT_NAMES.has(text)) {
      className = 'expr-token-const';
    } else if (text === 'x') {
      className = 'expr-token-var';
    } else if (/^\d+(?:\.\d+)?$/u.test(text)) {
      className = 'expr-token-num';
    } else if (/^[+\-*/^%=(),]$/u.test(text)) {
      className = 'expr-token-op';
    }
    tokens.push(<span key={index++} className={className || undefined}>{text}</span>);
  }
  return tokens;
}

function nextFreeSeq(fns) {
  const used = new Set(fns.map(f => f.labelSeq).filter(n => Number.isFinite(n)));
  let i = 0;
  while (used.has(i)) i++;
  return i;
}

function nextFreeColor(fns, palette) {
  const used = new Set(fns.map(f => f.color));
  for (const c of palette) if (!used.has(c)) return c;
  return palette[fns.length % palette.length];
}

function humanizeError(msg) {
  if (!msg) return 'Invalid expression';
  if (msg.startsWith('Unknown: ')) return 'Unknown name "' + msg.slice(9) + '"';
  if (msg.startsWith('Not a function: ')) return '"' + msg.slice(16) + '" is not callable';
  if (msg.startsWith('Unexpected character: ')) return 'Unexpected character "' + msg.slice(22) + '"';
  if (msg.includes('Unexpected token')) return 'Check syntax near an operator';
  if (msg.includes('Trailing tokens')) return 'Extra characters at end';
  if (msg.startsWith('Bad op: ')) return 'Unsupported operator';
  return msg;
}

function evaluateSafe(fn, x) {
  try {
    const y = fn(x);
    return Number.isFinite(y) ? y : NaN;
  } catch {
    return NaN;
  }
}

function bisectRoot(fn, left, right, maxIter = 32) {
  let a = left;
  let b = right;
  let fa = evaluateSafe(fn, a);
  let fb = evaluateSafe(fn, b);
  if (!Number.isFinite(fa) || !Number.isFinite(fb)) return null;
  if (Math.abs(fa) < 1e-10) return a;
  if (Math.abs(fb) < 1e-10) return b;
  if (fa * fb > 0) return null;
  for (let i = 0; i < maxIter; i++) {
    const mid = (a + b) / 2;
    const fm = evaluateSafe(fn, mid);
    if (!Number.isFinite(fm)) return null;
    if (Math.abs(fm) < 1e-10) return mid;
    if (fa * fm <= 0) {
      b = mid;
      fb = fm;
    } else {
      a = mid;
      fa = fm;
    }
  }
  return (a + b) / 2;
}

function dedupePoints(points, xTol, yTol) {
  const sorted = [...points].sort((a, b) => a.x - b.x || a.y - b.y);
  const deduped = [];
  sorted.forEach((point) => {
    const last = deduped[deduped.length - 1];
    if (last && Math.abs(last.x - point.x) <= xTol && Math.abs(last.y - point.y) <= yTol && last.type === point.type) return;
    deduped.push(point);
  });
  return deduped;
}

function scanRoots(fn, xMin, xMax, sampleCount, yTol) {
  const roots = [];
  const pushRoot = (x) => {
    if (!Number.isFinite(x)) return;
    const y = evaluateSafe(fn, x);
    if (!Number.isFinite(y) || Math.abs(y) > yTol * 3) return;
    roots.push(x);
  };
  const step = (xMax - xMin) / sampleCount;
  let prevX = xMin;
  let prevY = evaluateSafe(fn, prevX);
  if (Number.isFinite(prevY) && Math.abs(prevY) <= 1e-8) pushRoot(prevX);
  for (let i = 1; i <= sampleCount; i++) {
    const x = xMin + step * i;
    const y = evaluateSafe(fn, x);
    if (!Number.isFinite(prevY) || !Number.isFinite(y)) {
      prevX = x;
      prevY = y;
      continue;
    }
    if (Math.abs(y) <= 1e-8) pushRoot(x);
    if (prevY * y < 0) {
      const root = bisectRoot(fn, prevX, x);
      if (root != null) pushRoot(root);
    }
    prevX = x;
    prevY = y;
  }
  return dedupePoints(roots.map(x => ({ x, y: 0, type: 'zero' })), step * 1.5, yTol * 2).map(p => p.x);
}

function scanExtrema(fn, xMin, xMax, sampleCount) {
  const span = xMax - xMin;
  if (!Number.isFinite(span) || span <= 0) return [];
  const h = span / (sampleCount * 80);
  const derivAt = (x) => {
    const yp = evaluateSafe(fn, x + h);
    const ym = evaluateSafe(fn, x - h);
    if (!Number.isFinite(yp) || !Number.isFinite(ym)) return NaN;
    return (yp - ym) / (2 * h);
  };
  const extrema = [];
  const step = span / sampleCount;
  let prevX = xMin;
  let prevD = derivAt(prevX);
  for (let i = 1; i <= sampleCount; i++) {
    const x = xMin + step * i;
    const d = derivAt(x);
    if (Number.isFinite(prevD) && Number.isFinite(d) && prevD * d < 0 && Math.abs(prevD - d) < 1e8) {
      let a = prevX, b = x, da = prevD;
      for (let k = 0; k < 28; k++) {
        const mid = (a + b) / 2;
        const dm = derivAt(mid);
        if (!Number.isFinite(dm)) break;
        if (Math.abs(dm) < 1e-10) { a = b = mid; break; }
        if (da * dm <= 0) { b = mid; } else { a = mid; da = dm; }
      }
      const root = (a + b) / 2;
      const y = evaluateSafe(fn, root);
      if (Number.isFinite(y)) {
        extrema.push({ x: root, y, type: prevD > 0 ? 'max' : 'min' });
      }
    }
    prevX = x; prevD = d;
  }
  return extrema;
}

function computeSpecialPoints(functions, xMin, xMax, yMin, yMax, scale, width) {
  const visible = functions.filter(fn => fn.visible && fn.compiled);
  if (!visible.length || !Number.isFinite(xMin) || !Number.isFinite(xMax)) return [];
  const sampleCount = Math.max(320, Math.min(1600, Math.floor(width * 1.5)));
  const yTol = Math.max(1e-6, 6 / scale);
  const points = [];

  visible.forEach((fn) => {
    const zeros = scanRoots(fn.compiled, xMin, xMax, sampleCount, yTol);
    zeros.forEach((x) => {
      points.push({
        type: 'zero', x, y: 0,
        color: fn.color, fnId: fn.id, label: fn.label,
      });
    });
    const extrema = scanExtrema(fn.compiled, xMin, xMax, Math.min(sampleCount, 900));
    extrema.forEach(({ x, y, type }) => {
      points.push({
        type, x, y,
        color: fn.color, fnId: fn.id, label: fn.label,
      });
    });
  });

  for (let i = 0; i < visible.length; i++) {
    for (let j = i + 1; j < visible.length; j++) {
      const leftFn = visible[i].compiled;
      const rightFn = visible[j].compiled;
      const diff = (x) => leftFn(x) - rightFn(x);
      const roots = scanRoots(diff, xMin, xMax, sampleCount, yTol);
      roots.forEach((x) => {
        const y = evaluateSafe(leftFn, x);
        if (!Number.isFinite(y)) return;
        points.push({
          type: 'intersection', x, y,
          color: visible[i].color, color2: visible[j].color,
          fnId: visible[i].id, fn2Id: visible[j].id,
          label: visible[i].label, label2: visible[j].label,
        });
      });
    }
  }

  return dedupePoints(
    points.filter(point => point.y >= yMin - yTol * 4 && point.y <= yMax + yTol * 4),
    (xMax - xMin) / sampleCount * 2,
    yTol * 3,
  );
}

function PlotCanvas({ functions, view, setView, theme, onTrace, coordMode }) {
  const canvasRef = useRef(null);
  const wrapRef = useRef(null);
  const [size, setSize] = useState({ w: 800, h: 600 });
  const [mouse, setMouse] = useState(null);
  const draggingRef = useRef(null);
  const [labelFade, setLabelFade] = useState(null);
  const [revealedPointKey, setRevealedPointKey] = useState(null);
  const revealTimerRef = useRef(null);
  const prevCoordModeRef = useRef(coordMode);

  useEffect(() => {
    if (!wrapRef.current) return;
    const ro = new ResizeObserver(() => {
      const r = wrapRef.current.getBoundingClientRect();
      setSize({ w: Math.floor(r.width), h: Math.floor(r.height) });
    });
    ro.observe(wrapRef.current);
    return () => ro.disconnect();
  }, []);

  const worldToScreen = useCallback((wx, wy) => {
    const { cx, cy, scale } = view;
    return [size.w / 2 + (wx - cx) * scale, size.h / 2 - (wy - cy) * scale];
  }, [view, size]);
  const screenToWorld = useCallback((sx, sy) => {
    const { cx, cy, scale } = view;
    return [cx + (sx - size.w / 2) / scale, cy - (sy - size.h / 2) / scale];
  }, [view, size]);

  useEffect(() => {
    if (prevCoordModeRef.current === coordMode) return;
    const from = prevCoordModeRef.current;
    prevCoordModeRef.current = coordMode;
    let raf = 0;
    const duration = 220;
    const started = performance.now();
    const tick = (now) => {
      const progress = Math.min(1, (now - started) / duration);
      setLabelFade({ from, to: coordMode, progress });
      if (progress < 1) raf = requestAnimationFrame(tick);
      else setTimeout(() => setLabelFade(null), 0);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [coordMode]);

  const worldBounds = useMemo(() => {
    const [wxMin, wyMax] = screenToWorld(0, 0);
    const [wxMax, wyMin] = screenToWorld(size.w, size.h);
    return { wxMin, wxMax, wyMin, wyMax };
  }, [screenToWorld, size]);

  const specialPoints = useMemo(() => (
    computeSpecialPoints(
      functions,
      worldBounds.wxMin,
      worldBounds.wxMax,
      worldBounds.wyMin,
      worldBounds.wyMax,
      view.scale,
      size.w,
    )
  ), [functions, worldBounds, view.scale, size.w]);

  const pointOverlay = useMemo(() => {
    const screenPoints = specialPoints
      .map((point) => {
        const [sx, sy] = worldToScreen(point.x, point.y);
        const distanceToMouse = mouse ? Math.hypot(sx - mouse.x, sy - mouse.y) : Infinity;
        return { ...point, key: getPointKey(point), sx, sy, distanceToMouse };
      })
      .filter(point => point.sx >= -16 && point.sx <= size.w + 16 && point.sy >= -16 && point.sy <= size.h + 16);

    const snappedPoint = mouse
      ? screenPoints.reduce((closest, point) => (
          point.distanceToMouse < (closest?.distanceToMouse ?? Infinity) ? point : closest
        ), null)
      : null;

    return {
      screenPoints,
      snappedPoint: snappedPoint && snappedPoint.distanceToMouse <= 16 ? snappedPoint : null,
    };
  }, [mouse, size, specialPoints, worldToScreen]);

  const curveTracker = useMemo(() => {
    if (!mouse) return null;
    const [wx] = screenToWorld(mouse.x, mouse.y);
    let best = null;
    functions.forEach((fn) => {
      if (!fn.visible || !fn.compiled) return;
      const y = evaluateSafe(fn.compiled, wx);
      if (!Number.isFinite(y)) return;
      const [, sy] = worldToScreen(wx, y);
      const dist = Math.abs(sy - mouse.y);
      if (!best || dist < best.dist) best = { fn, x: wx, y, sx: mouse.x, sy, dist };
    });
    return best && best.dist <= 26 ? best : null;
  }, [mouse, functions, worldToScreen, screenToWorld]);

  const visiblePoint = pointOverlay.snappedPoint && pointOverlay.snappedPoint.key === revealedPointKey
    ? pointOverlay.snappedPoint
    : null;

  const showCurveTrace = !visiblePoint && !!curveTracker;

  useEffect(() => {
    window.clearTimeout(revealTimerRef.current);
    if (!pointOverlay.snappedPoint) {
      setRevealedPointKey(null);
      return;
    }
    const nextKey = pointOverlay.snappedPoint.key;
    setRevealedPointKey(null);
    revealTimerRef.current = window.setTimeout(() => {
      setRevealedPointKey(nextKey);
    }, 150);
    return () => window.clearTimeout(revealTimerRef.current);
  }, [pointOverlay.snappedPoint?.key]);

  useEffect(() => {
    if (!onTrace) return;
    if (visiblePoint) {
      onTrace({
        fn: { color: visiblePoint.type === 'intersection' ? theme.ink : visiblePoint.color, label: visiblePoint.label },
        x: visiblePoint.x,
        y: visiblePoint.y,
        kind: visiblePoint.type,
        label2: visiblePoint.label2,
      });
      return;
    }
    if (curveTracker) {
      onTrace({
        fn: { color: curveTracker.fn.color, label: curveTracker.fn.label },
        x: curveTracker.x,
        y: curveTracker.y,
        kind: 'curve',
      });
      return;
    }
    onTrace(null);
  }, [onTrace, theme.ink, visiblePoint, curveTracker]);

  const draw = useCallback(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = size.w * dpr;
    canvas.height = size.h * dpr;
    canvas.style.width = size.w + 'px';
    canvas.style.height = size.h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, size.w, size.h);

    const { scale } = view;
    const targetPx = 80;
    const roughStep = targetPx / scale;
    const pow = Math.pow(10, Math.floor(Math.log10(roughStep)));
    const normalized = roughStep / pow;
    let step;
    if (normalized < 1.5) step = pow;
    else if (normalized < 3.5) step = 2 * pow;
    else if (normalized < 7.5) step = 5 * pow;
    else step = 10 * pow;
    const minorStep = step / 5;

    const { wxMin, wxMax, wyMin, wyMax } = worldBounds;

    const drawGridLines = (st, color, width) => {
      ctx.strokeStyle = color; ctx.lineWidth = width;
      ctx.beginPath();
      const startX = Math.ceil(wxMin / st) * st;
      for (let x = startX; x <= wxMax; x += st) {
        const [sx] = worldToScreen(x, 0);
        ctx.moveTo(sx + 0.5, 0); ctx.lineTo(sx + 0.5, size.h);
      }
      const startY = Math.ceil(wyMin / st) * st;
      for (let y = startY; y <= wyMax; y += st) {
        const [, sy] = worldToScreen(0, y);
        ctx.moveTo(0, sy + 0.5); ctx.lineTo(size.w, sy + 0.5);
      }
      ctx.stroke();
    };
    drawGridLines(minorStep, theme.gridMinor, 1);
    drawGridLines(step, theme.gridMajor, 1);

    ctx.strokeStyle = theme.axis; ctx.lineWidth = 1.25;
    ctx.beginPath();
    const [, ax0Y] = worldToScreen(0, 0);
    const [ax0X] = worldToScreen(0, 0);
    if (ax0Y >= 0 && ax0Y <= size.h) { ctx.moveTo(0, ax0Y + 0.5); ctx.lineTo(size.w, ax0Y + 0.5); }
    if (ax0X >= 0 && ax0X <= size.w) { ctx.moveTo(ax0X + 0.5, 0); ctx.lineTo(ax0X + 0.5, size.h); }
    ctx.stroke();

    ctx.fillStyle = theme.muted;
    ctx.font = '11px "JetBrains Mono", ui-monospace, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const fmtTick = (v) => {
      if (Math.abs(v) < 1e-10) return '0';
      const abs = Math.abs(v);
      if (abs >= 1e5 || abs < 1e-3) return v.toExponential(1);
      const digits = step < 1 ? Math.max(0, -Math.floor(Math.log10(step))) : 0;
      return v.toFixed(digits);
    };
    const startX = Math.ceil(wxMin / step) * step;
    for (let x = startX; x <= wxMax; x += step) {
      if (Math.abs(x) < step * 0.001) continue;
      const [sx] = worldToScreen(x, 0);
      const yLabel = Math.max(4, Math.min(size.h - 16, ax0Y + 4));
      ctx.fillText(fmtTick(x), sx, yLabel);
    }
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    const startY = Math.ceil(wyMin / step) * step;
    for (let y = startY; y <= wyMax; y += step) {
      if (Math.abs(y) < step * 0.001) continue;
      const [, sy] = worldToScreen(0, y);
      const xLabel = Math.max(24, Math.min(size.w - 4, ax0X - 6));
      ctx.fillText(fmtTick(y), xLabel, sy);
    }
    if (ax0X >= 0 && ax0X <= size.w && ax0Y >= 0 && ax0Y <= size.h) {
      ctx.textAlign = 'right'; ctx.textBaseline = 'top';
      ctx.fillText('0', ax0X - 4, ax0Y + 4);
    }

    const labelAnchors = [];
    functions.forEach((fn) => {
      if (!fn.visible || !fn.compiled) return;
      ctx.strokeStyle = fn.color;
      ctx.lineWidth = fn.thickness || 2;
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      ctx.beginPath();
      const samples = size.w * 2;
      let prev = null;
      let lastGood = null;
      for (let i = 0; i <= samples; i++) {
        const sx = (i / samples) * size.w;
        const [wx] = screenToWorld(sx, 0);
        let wy;
        try { wy = fn.compiled(wx); } catch { wy = NaN; }
        if (!isFinite(wy)) { prev = null; continue; }
        const [, sy] = worldToScreen(wx, wy);
        if (prev && Math.abs(sy - prev[1]) > size.h * 1.5) prev = null;
        if (prev == null) ctx.moveTo(sx, sy); else ctx.lineTo(sx, sy);
        prev = [sx, sy];
        if (sy >= 0 && sy <= size.h) lastGood = [sx, sy];
      }
      ctx.stroke();
      if (lastGood && fn.label) labelAnchors.push({ label: fn.label, color: fn.color, sx: lastGood[0], sy: lastGood[1] });
    });

    // Function labels near the right edge of each curve
    if (labelAnchors.length) {
      ctx.save();
      ctx.font = '600 11px "JetBrains Mono", ui-monospace, monospace';
      ctx.textBaseline = 'middle';
      const placed = [];
      labelAnchors
        .sort((a, b) => b.sx - a.sx)
        .forEach(({ label, color, sx, sy }) => {
          let lx = Math.min(sx + 6, size.w - 4 - ctx.measureText(label).width);
          let ly = Math.max(10, Math.min(size.h - 10, sy));
          const minGap = 14;
          let tries = 0;
          while (placed.some(p => Math.abs(p.sx - lx) < 40 && Math.abs(p.sy - ly) < minGap) && tries++ < 12) {
            ly += (tries % 2 ? -1 : 1) * minGap;
            ly = Math.max(10, Math.min(size.h - 10, ly));
          }
          placed.push({ sx: lx, sy: ly });
          ctx.fillStyle = theme.panel;
          const w = ctx.measureText(label).width;
          ctx.globalAlpha = 0.88;
          ctx.fillRect(lx - 2, ly - 8, w + 4, 16);
          ctx.globalAlpha = 1;
          ctx.fillStyle = color;
          ctx.textAlign = 'left';
          ctx.fillText(label, lx, ly);
        });
      ctx.restore();
    }

    const { screenPoints, snappedPoint } = pointOverlay;
    const activePoint = snappedPoint;

    const labelPhases = labelFade
      ? [
          { mode: labelFade.from, alpha: 1 - labelFade.progress },
          { mode: labelFade.to, alpha: labelFade.progress },
        ]
      : [{ mode: coordMode, alpha: 1 }];

    screenPoints.forEach((point) => {
      ctx.save();
      const isActive = activePoint === point;
      const radius = isActive ? 5.5 : 4;
      if (point.type === 'intersection') {
        // Bicolor split disc for intersections
        ctx.lineWidth = 1.4;
        ctx.strokeStyle = theme.panel;
        ctx.beginPath();
        ctx.arc(point.sx, point.sy, radius, -Math.PI / 2, Math.PI / 2);
        ctx.fillStyle = point.color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(point.sx, point.sy, radius, Math.PI / 2, -Math.PI / 2);
        ctx.fillStyle = point.color2 || point.color;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(point.sx, point.sy, radius, 0, Math.PI * 2);
        ctx.strokeStyle = theme.ink;
        ctx.lineWidth = 1.2;
        ctx.stroke();
      } else if (point.type === 'max' || point.type === 'min') {
        // Diamond for extrema
        ctx.fillStyle = point.color;
        ctx.strokeStyle = theme.panel;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(point.sx, point.sy - radius);
        ctx.lineTo(point.sx + radius, point.sy);
        ctx.lineTo(point.sx, point.sy + radius);
        ctx.lineTo(point.sx - radius, point.sy);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      } else {
        // Zero
        ctx.fillStyle = point.color;
        ctx.strokeStyle = theme.panel;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(point.sx, point.sy, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }
      ctx.restore();
    });

    const typeText = { zero: 'zero', max: 'max', min: 'min', intersection: '∩' };
    const drawReadout = (point, { titleLines, color, showCrosshair }) => {
      ctx.save();
      if (showCrosshair) {
        ctx.strokeStyle = theme.ruleStrong;
        ctx.lineWidth = 1;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(point.sx, 0); ctx.lineTo(point.sx, size.h);
        ctx.moveTo(0, point.sy); ctx.lineTo(size.w, point.sy);
        ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.strokeStyle = theme.ruleStrong;
        ctx.lineWidth = 1;
        ctx.setLineDash([2, 3]);
        ctx.beginPath();
        ctx.moveTo(point.sx, point.sy);
        ctx.lineTo(point.sx, size.h);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();

      ctx.save();
      ctx.font = '600 10px "JetBrains Mono", ui-monospace, monospace';
      const titleWidth = titleLines.reduce((w, line) => Math.max(w, ctx.measureText(line).width), 0);
      ctx.font = '11px "JetBrains Mono", ui-monospace, monospace';
      const coordLabels = labelPhases.map(({ mode, alpha }) => ({
        text: formatPointLabel(point.x, point.y, mode),
        alpha,
      })).filter(label => label.alpha > 0.001);
      const coordWidth = coordLabels.reduce((w, l) => Math.max(w, ctx.measureText(l.text).width), 0);
      const contentW = Math.max(titleWidth, coordWidth);
      const padX = 7;
      const titleH = titleLines.length ? 14 : 0;
      const boxH = titleH + 18;
      let lx = point.sx + 10;
      let ly = point.sy - boxH - 8;
      if (lx + contentW + padX * 2 > size.w - 6) lx = point.sx - contentW - padX * 2 - 10;
      if (ly < 6) ly = point.sy + 12;
      if (ly + boxH > size.h - 6) ly = point.sy - boxH - 8;

      ctx.fillStyle = theme.panel;
      ctx.strokeStyle = theme.ruleStrong;
      ctx.lineWidth = 1;
      ctx.fillRect(lx, ly, contentW + padX * 2, boxH);
      ctx.strokeRect(lx + 0.5, ly + 0.5, contentW + padX * 2 - 1, boxH - 1);

      if (titleLines.length) {
        ctx.font = '600 10px "JetBrains Mono", ui-monospace, monospace';
        ctx.fillStyle = color || theme.muted;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(titleLines.join('  '), lx + padX, ly + 8);
      }
      coordLabels.forEach(({ text, alpha }) => {
        ctx.save();
        ctx.globalAlpha = alpha;
        ctx.fillStyle = theme.ink;
        ctx.font = '11px "JetBrains Mono", ui-monospace, monospace';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, lx + padX, ly + titleH + 9);
        ctx.restore();
      });
      ctx.restore();
    };

    if (visiblePoint) {
      const titleLines = [];
      if (visiblePoint.type === 'intersection') {
        titleLines.push(`${visiblePoint.label || ''} ∩ ${visiblePoint.label2 || ''}`.trim());
      } else if (visiblePoint.type && typeText[visiblePoint.type]) {
        titleLines.push(`${visiblePoint.label || ''} · ${typeText[visiblePoint.type]}`.trim());
      }
      drawReadout(visiblePoint, { titleLines, color: visiblePoint.color, showCrosshair: true });
    } else if (showCurveTrace) {
      const tracker = curveTracker;
      ctx.save();
      ctx.fillStyle = tracker.fn.color;
      ctx.strokeStyle = theme.panel;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(tracker.sx, tracker.sy, 4.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
      drawReadout(
        { sx: tracker.sx, sy: tracker.sy, x: tracker.x, y: tracker.y },
        { titleLines: tracker.fn.label ? [tracker.fn.label] : [], color: tracker.fn.color, showCrosshair: false },
      );
    }
  }, [coordMode, labelFade, pointOverlay, size, theme, view, visiblePoint, curveTracker, showCurveTrace, worldBounds, worldToScreen, screenToWorld, functions]);

  useEffect(() => { draw(); }, [draw]);

  const pinchRef = useRef(null);

  const onMouseDown = (e) => {
    draggingRef.current = { x: e.clientX, y: e.clientY, view: { ...view } };
    setMouse(null);
  };
  const onMouseMove = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    const nextMouse = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    if (draggingRef.current) {
      const dx = e.clientX - draggingRef.current.x;
      const dy = e.clientY - draggingRef.current.y;
      setView({
        ...draggingRef.current.view,
        cx: draggingRef.current.view.cx - dx / view.scale,
        cy: draggingRef.current.view.cy + dy / view.scale,
      });
      setMouse(null);
      return;
    }
    setMouse(nextMouse);
  };
  const onMouseUp = () => { draggingRef.current = null; };
  const onMouseLeave = () => { draggingRef.current = null; setMouse(null); };
  const onWheel = (e) => {
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const [wxBefore, wyBefore] = screenToWorld(mx, my);
    const factor = Math.exp(-e.deltaY * 0.0015);
    const newScale = Math.max(0.5, Math.min(8000, view.scale * factor));
    const newCx = wxBefore - (mx - size.w / 2) / newScale;
    const newCy = wyBefore + (my - size.h / 2) / newScale;
    setView({ cx: newCx, cy: newCy, scale: newScale });
  };

  const onTouchStart = (e) => {
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 1) {
      const t = e.touches[0];
      draggingRef.current = { x: t.clientX, y: t.clientY, view: { ...view } };
      pinchRef.current = null;
      setMouse({ x: t.clientX - rect.left, y: t.clientY - rect.top });
    } else if (e.touches.length === 2) {
      draggingRef.current = null;
      const [t1, t2] = e.touches;
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      pinchRef.current = {
        dist, scale: view.scale, cx: view.cx, cy: view.cy,
        midX: (t1.clientX + t2.clientX) / 2 - rect.left,
        midY: (t1.clientY + t2.clientY) / 2 - rect.top,
      };
      setMouse(null);
    }
  };
  const onTouchMove = (e) => {
    e.preventDefault();
    const rect = canvasRef.current.getBoundingClientRect();
    if (e.touches.length === 1 && draggingRef.current) {
      const t = e.touches[0];
      const dx = t.clientX - draggingRef.current.x;
      const dy = t.clientY - draggingRef.current.y;
      setView({
        ...draggingRef.current.view,
        cx: draggingRef.current.view.cx - dx / view.scale,
        cy: draggingRef.current.view.cy + dy / view.scale,
      });
      setMouse({ x: t.clientX - rect.left, y: t.clientY - rect.top });
    } else if (e.touches.length === 2 && pinchRef.current) {
      const [t1, t2] = e.touches;
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      const factor = dist / pinchRef.current.dist;
      const newScale = Math.max(0.5, Math.min(8000, pinchRef.current.scale * factor));
      const mx = pinchRef.current.midX, my = pinchRef.current.midY;
      const wxBefore = pinchRef.current.cx + (mx - size.w / 2) / pinchRef.current.scale;
      const wyBefore = pinchRef.current.cy - (my - size.h / 2) / pinchRef.current.scale;
      const newCx = wxBefore - (mx - size.w / 2) / newScale;
      const newCy = wyBefore + (my - size.h / 2) / newScale;
      setView({ cx: newCx, cy: newCy, scale: newScale });
    }
  };
  const onTouchEnd = (e) => {
    if (e.touches.length === 0) {
      draggingRef.current = null;
      pinchRef.current = null;
      setMouse(null);
    }
  };

  return (
    <div ref={wrapRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden' }}>
      <canvas
        ref={canvasRef}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove}
        onMouseUp={onMouseUp} onMouseLeave={onMouseLeave}
        onWheel={onWheel}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd} onTouchCancel={onTouchEnd}
        style={{ display: 'block', cursor: draggingRef.current ? 'grabbing' : 'crosshair' }}
        aria-label="Function plot canvas"
      />
    </div>
  );
}

function FunctionRow({ fn, theme, onChange, onDelete, isOnly }) {
  const [editing, setEditing] = useState(!fn.expr);
  const [draft, setDraft] = useState(fn.expr);
  const inputRef = useRef(null);
  useEffect(() => { setDraft(fn.expr); }, [fn.expr]);
  useEffect(() => {
    if (editing && inputRef.current) {
      inputRef.current.focus();
      inputRef.current.select();
    }
  }, [editing]);
  const commit = () => { onChange({ ...fn, expr: draft }); setEditing(false); };
  const hasError = !!fn.error;
  const label = fn.label || 'f';

  return (
    <div style={{
      display: 'flex', alignItems: 'stretch',
      borderBottom: `1px solid ${theme.rule}`,
      background: theme.panel,
    }}>
      <button
        onClick={() => onChange({ ...fn, visible: !fn.visible })}
        title={fn.visible ? 'Hide' : 'Show'}
        aria-label={fn.visible ? `Hide ${label}` : `Show ${label}`}
        style={{
          width: 36, border: 'none', cursor: 'pointer', background: 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          borderRight: `1px solid ${theme.rule}`,
        }}
      >
        <div style={{
          width: 14, height: 14, borderRadius: 14,
          background: fn.visible ? fn.color : 'transparent',
          border: fn.visible ? 'none' : `1.5px dashed ${theme.ruleStrong}`,
          transition: 'all 150ms',
        }}/>
      </button>

      <div style={{ flex: 1, padding: '10px 10px 10px 12px', minWidth: 0 }}>
        <div style={{
          fontFamily: '"JetBrains Mono", monospace', fontSize: 11,
          color: theme.muted, letterSpacing: '0.02em',
          opacity: fn.visible ? 1 : 0.45,
        }}>
          {label}(x) =
        </div>
        {editing ? (
          <input
            ref={inputRef} value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onBlur={commit}
            onKeyDown={(e) => {
              if (e.key === 'Enter') commit();
              if (e.key === 'Escape') { setDraft(fn.expr); setEditing(false); }
            }}
            placeholder="e.g. sin(x) * x"
            aria-label={`Expression for ${label}`}
            style={{
              width: '100%', border: 'none', outline: 'none', background: 'transparent',
              fontFamily: '"JetBrains Mono", monospace', fontSize: 14, color: theme.ink,
              padding: '2px 0', marginTop: 2,
              borderBottom: `1.5px solid ${fn.color}`,
            }}
          />
        ) : (
          <div
            onClick={() => setEditing(true)}
            style={{
              fontFamily: '"JetBrains Mono", monospace', fontSize: 14,
              color: hasError ? '#c94a3a' : theme.ink,
              cursor: 'text', padding: '2px 0', marginTop: 2,
              opacity: fn.visible ? 1 : 0.45, wordBreak: 'break-word',
              textDecoration: hasError ? 'underline wavy #c94a3a' : 'none',
              textUnderlineOffset: 3,
            }}
          >
            {fn.expr ? (
              hasError ? fn.expr : <span className="expr-preview">{renderExpressionPreview(fn.expr)}</span>
            ) : (
              <span style={{ color: theme.muted }}>click to enter an expression…</span>
            )}
          </div>
        )}
        {hasError && (
          <div style={{ fontSize: 11, color: '#c94a3a', marginTop: 3, fontFamily: '"JetBrains Mono", monospace' }}>
            {fn.error}
          </div>
        )}
      </div>

      {!isOnly && (
        <button
          onClick={onDelete} title="Remove" aria-label={`Remove ${label}`}
          style={{
            width: 32, border: 'none', background: 'transparent',
            color: theme.muted, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            opacity: 0.5,
          }}
          onMouseEnter={e => e.currentTarget.style.opacity = 1}
          onMouseLeave={e => e.currentTarget.style.opacity = 0.5}
        >
          <TrashIcon/>
        </button>
      )}
    </div>
  );
}

    const copy = [...functions]; copy[idx] = next; setFunctions(copy);

// ───── Animated shell: handles smooth width transition + crossfade ─────
function SidebarShell(props) {
  const { collapsed, expandedWidth, theme, onResizeStart, resizing } = props;
  const currentWidth = collapsed ? RAIL_WIDTH : expandedWidth;
  const expandedSnapshotRef = useRef(expandedWidth);
  // Keep the expanded snapshot stable during collapse so content doesn't reflow
  if (!collapsed) expandedSnapshotRef.current = expandedWidth;

  return (
    <div
      className={`sidebar-shell ${resizing ? 'no-anim' : ''}`}
      style={{
        width: currentWidth,
        borderRight: `1px solid ${theme.rule}`,
        background: theme.panel,
      }}
    >
      {/* Expanded content — stays mounted, crossfades */}
      <div
        className={`sidebar-content ${collapsed ? 'hidden' : ''}`}
        style={{ width: expandedSnapshotRef.current }}
      >
        <ExpandedSidebarInner {...props} width={expandedSnapshotRef.current} />
      </div>
      {/* Collapsed rail */}
      <div className={`sidebar-rail ${collapsed ? '' : 'hidden'}`}>
        <CollapsedRailInner
          functions={props.functions}
          theme={theme}
          onExpand={props.onExpand}
          onToggleVisibility={props.onToggleVisibility}
        />
      </div>
      {/* Resize handle — only when expanded */}
      {!collapsed && (
        <div
          className="resize-handle"
          onMouseDown={onResizeStart}
          title="Drag to resize"
          style={{
            position: 'absolute',
            top: 0, right: -3, bottom: 0,
            width: 6, cursor: 'col-resize', zIndex: 10,
          }}
        >
          <div className="resize-bar" style={{
            position: 'absolute', top: 0, bottom: 0, left: 3, width: 1,
          }}/>
        </div>
      )}
    </div>
  );
}

const DEFAULT_FUNCTIONS = [
  { expr: 'sin(x)' },
  { expr: '0.5 * x^2 - 2' },
  { expr: 'cos(x) * e^(-0.1 * x^2)' },
];

function App() {
  const [themeKey, setThemeKey] = useState(() => {
    try {
      const stored = localStorage.getItem('locus:theme');
      if (stored && window.LOCUS_THEMES[stored]) return stored;
    } catch {}
    return TWEAK_DEFAULTS.theme;
  });
  const theme = window.LOCUS_THEMES[themeKey] || window.LOCUS_THEMES.linen;
  const [coordMode, setCoordMode] = useState(() => {
    try {
      const stored = localStorage.getItem('locus:coordMode');
      if (stored === COORD_MODES.exact || stored === COORD_MODES.decimal) return stored;
    } catch {}
    return COORD_MODES.exact;
  });

  const [functions, setFunctions] = useState(() => {
    try {
      const s = localStorage.getItem('locus:functions');
      if (s) {
        const parsed = JSON.parse(s);
        if (Array.isArray(parsed) && parsed.length) {
          // Back-fill stable labels for items saved before labelSeq existed.
          const used = new Set(parsed.map(f => f.labelSeq).filter(n => Number.isFinite(n)));
          let next = 0;
          return parsed.map((f) => {
            if (Number.isFinite(f.labelSeq)) return { ...f, label: formatFnLabel(f.labelSeq) };
            while (used.has(next)) next++;
            const seq = next++;
            used.add(seq);
            return { ...f, labelSeq: seq, label: formatFnLabel(seq) };
          });
        }
      }
    } catch {}
    const palette = window.LOCUS_THEMES[TWEAK_DEFAULTS.theme].funcPalette;
    return DEFAULT_FUNCTIONS.map((f, i) => ({
      id: Math.random().toString(36).slice(2, 9),
      expr: f.expr, visible: true,
      color: palette[i % palette.length], thickness: 2,
      labelSeq: i, label: formatFnLabel(i),
    }));
  });

  const [view, setView] = useState(() => {
    try {
      const s = localStorage.getItem('locus:view');
      if (s) return JSON.parse(s);
    } catch {}
    return { cx: 0, cy: 0, scale: 50 };
  });

  const [traceInfo, setTraceInfo] = useState(null);
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const tweaksRef = useRef(null);

  const [sidebarWidth, setSidebarWidth] = useState(() => {
    try {
      const s = localStorage.getItem('locus:sidebarWidth');
      if (s) return Math.max(260, Math.min(600, parseInt(s, 10) || 340));
    } catch {}
    return 340;
  });
  const [collapsed, setCollapsed] = useState(() => {
    try { return localStorage.getItem('locus:collapsed') === '1'; } catch { return false; }
  });
  const [resizing, setResizing] = useState(false);

  useEffect(() => { try { localStorage.setItem('locus:theme', themeKey); } catch {} }, [themeKey]);
  useEffect(() => { try { localStorage.setItem('locus:coordMode', coordMode); } catch {} }, [coordMode]);
  useEffect(() => { try { localStorage.setItem('locus:functions', JSON.stringify(functions)); } catch {} }, [functions]);
  useEffect(() => { try { localStorage.setItem('locus:view', JSON.stringify(view)); } catch {} }, [view]);
  useEffect(() => { try { localStorage.setItem('locus:sidebarWidth', String(sidebarWidth)); } catch {} }, [sidebarWidth]);
  useEffect(() => { try { localStorage.setItem('locus:collapsed', collapsed ? '1' : '0'); } catch {} }, [collapsed]);

  const onResizeStart = (e) => {
    e.preventDefault();
    const startX = e.clientX;
    const startW = sidebarWidth;
    setResizing(true);
    document.body.classList.add('resizing');
    const onMove = (ev) => {
      const w = Math.max(260, Math.min(600, startW + (ev.clientX - startX)));
      setSidebarWidth(w);
    };
    const onUp = () => {
      setResizing(false);
      document.body.classList.remove('resizing');
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
    };
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  };

  const compiledFunctions = useMemo(() => {
    return functions.map(f => {
      const label = f.label || formatFnLabel(f.labelSeq);
      if (!f.expr || !f.expr.trim()) return { ...f, label, compiled: null, error: null };
      try {
        const compiled = window.LocusMath.compile(f.expr);
        const probe = compiled(0);
        // Allow NaN at x=0 (e.g. 1/x) — only surface actual thrown errors.
        return { ...f, label, compiled, error: null };
      } catch (err) {
        return { ...f, label, compiled: null, error: humanizeError(err.message) };
      }
    });
  }, [functions]);

  const prevThemeRef = useRef(themeKey);
  useEffect(() => {
    if (prevThemeRef.current === themeKey) return;
    const oldTheme = window.LOCUS_THEMES[prevThemeRef.current] || theme;
    prevThemeRef.current = themeKey;
    setFunctions(prev => prev.map((f) => {
      const idx = oldTheme.funcPalette.indexOf(f.color);
      // If the color wasn't from the previous theme's palette (user customized),
      // leave it alone. Otherwise remap to the same slot in the new palette.
      if (idx < 0) return f;
      return { ...f, color: theme.funcPalette[idx % theme.funcPalette.length] };
    }));
  }, [themeKey, theme]);

  useEffect(() => {
    const onMsg = (e) => {
      if (!e.data) return;
      if (e.data.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data.type === '__deactivate_edit_mode') {
        setShowTweaks(false);
        setTweaksOpen(false);
      }
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    if (!showTweaks || !tweaksOpen) return;
    const onPointerDown = (e) => {
      if (tweaksRef.current && !tweaksRef.current.contains(e.target)) setTweaksOpen(false);
    };
    const onKeyDown = (e) => {
      if (e.key === 'Escape') setTweaksOpen(false);
    };
    window.addEventListener('pointerdown', onPointerDown);
    window.addEventListener('keydown', onKeyDown);
    return () => {
      window.removeEventListener('pointerdown', onPointerDown);
      window.removeEventListener('keydown', onKeyDown);
    };
  }, [showTweaks, tweaksOpen]);

  const pickTheme = (key) => {
    setThemeKey(key);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { theme: key } }, '*');
  };

  const exportPNG = () => {
    const canvas = document.querySelector('canvas');
    if (!canvas) return;
    const link = document.createElement('a');
    link.download = `locus-plot-${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };

  const setFunctionsFromSidebar = (next) => {
    const arr = typeof next === 'function' ? next(compiledFunctions) : next;
    setFunctions(arr.map(f => ({
      id: f.id, expr: f.expr, visible: f.visible, color: f.color, thickness: f.thickness,
      labelSeq: f.labelSeq, label: f.label,
    })));
  };

  const toggleVisibility = useCallback((id) => {
    setFunctions(prev => prev.map(f => f.id === id ? { ...f, visible: !f.visible } : f));
  }, []);

  const fitView = useCallback(() => {
    const visibleFns = compiledFunctions.filter(f => f.visible && f.compiled);
    if (!visibleFns.length) { setView({ cx: 0, cy: 0, scale: 50 }); return; }
    const canvasW = Math.max(360, window.innerWidth - (collapsed ? RAIL_WIDTH : sidebarWidth));
    const canvasH = Math.max(300, window.innerHeight);
    const xMin = -10, xMax = 10;
    let yMin = Infinity, yMax = -Infinity;
    visibleFns.forEach(fn => {
      for (let i = 0; i <= 600; i++) {
        const x = xMin + (xMax - xMin) * (i / 600);
        try {
          const y = fn.compiled(x);
          if (!Number.isFinite(y)) continue;
          if (Math.abs(y) > 1e8) continue;
          if (y < yMin) yMin = y;
          if (y > yMax) yMax = y;
        } catch {}
      }
    });
    if (!Number.isFinite(yMin) || !Number.isFinite(yMax) || yMin === yMax) {
      setView({ cx: 0, cy: 0, scale: 50 });
      return;
    }
    const pad = 1.15;
    const cx = 0;
    const cy = (yMin + yMax) / 2;
    const xRange = (xMax - xMin) * pad;
    const yRange = (yMax - yMin) * pad;
    const scale = Math.max(1, Math.min(4000, Math.min(canvasW / xRange, canvasH / yRange)));
    setView({ cx, cy, scale });
  }, [compiledFunctions, collapsed, sidebarWidth]);

  useEffect(() => {
    const onKey = (e) => {
      const tag = e.target && e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || (e.target && e.target.isContentEditable)) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      if (e.key === '+' || e.key === '=') {
        e.preventDefault();
        setView(v => ({ ...v, scale: Math.min(8000, v.scale * 1.4) }));
      } else if (e.key === '-' || e.key === '_') {
        e.preventDefault();
        setView(v => ({ ...v, scale: Math.max(0.5, v.scale / 1.4) }));
      } else if (e.key === '0' || e.key === 'H' || e.key === 'h') {
        e.preventDefault();
        setView({ cx: 0, cy: 0, scale: 50 });
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        fitView();
      } else if (e.key === 'e' || e.key === 'E') {
        e.preventDefault();
        exportPNG();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [fitView]);

  return (
    <div style={{ display: 'flex', width: '100%', height: '100%', background: theme.bg }}>
      <SidebarShell
        functions={compiledFunctions}
        setFunctions={setFunctionsFromSidebar}
        theme={theme}
        themeKey={themeKey}
        pickTheme={pickTheme}
        view={view}
        setView={setView}
        traceInfo={traceInfo}
        coordMode={coordMode}
        onExport={exportPNG}
        onFitView={fitView}
        onToggleVisibility={toggleVisibility}
        collapsed={collapsed}
        expandedWidth={sidebarWidth}
        onCollapse={() => setCollapsed(true)}
        onExpand={() => setCollapsed(false)}
        onResizeStart={onResizeStart}
        resizing={resizing}
      />

      <main style={{ flex: 1, position: 'relative', background: theme.bg, minWidth: 0 }}>
        <PlotCanvas
          functions={compiledFunctions}
          view={view} setView={setView}
          theme={theme} onTrace={setTraceInfo} coordMode={coordMode}
        />
        <div style={{ position: 'absolute', top: 16, right: 16 }}>
          <div className="coord-mode-switch" style={{ color: theme.muted, background: theme.panel, borderColor: theme.rule }}>
            <button
              className={coordMode === COORD_MODES.exact ? 'active' : ''}
              onClick={() => setCoordMode(COORD_MODES.exact)}
              title="Show coordinates as exact fractions of π, e where possible"
              aria-label="Exact coordinates"
              style={{ color: coordMode === COORD_MODES.exact ? theme.ink : theme.muted, background: coordMode === COORD_MODES.exact ? theme.chip : 'transparent' }}
            >Exact</button>
            <button
              className={coordMode === COORD_MODES.decimal ? 'active' : ''}
              onClick={() => setCoordMode(COORD_MODES.decimal)}
              title="Show coordinates as decimals"
              aria-label="Decimal coordinates"
              style={{ color: coordMode === COORD_MODES.decimal ? theme.ink : theme.muted, background: coordMode === COORD_MODES.decimal ? theme.chip : 'transparent' }}
            >Decimal</button>
          </div>
        </div>
        <div style={{
          position: 'absolute', bottom: 14, left: 14,
          fontFamily: '"JetBrains Mono", monospace',
          fontSize: 10, color: theme.muted,
          letterSpacing: '0.06em', userSelect: 'none',
          display: 'flex', gap: 14, flexWrap: 'wrap',
        }}>
          <span>drag · pan</span>
          <span>scroll · zoom</span>
          <span>hover · trace</span>
          <span>+ − 0 F · keys</span>
        </div>
      </main>

      {showTweaks && (
        <div ref={tweaksRef} style={{ position: 'absolute', top: 16, right: 16, zIndex: 1000 }}>
          <button
            onClick={() => setTweaksOpen(v => !v)}
            style={{
              marginTop: 36,
              marginLeft: 'auto',
              padding: '6px 10px',
              background: tweaksOpen ? '#fff' : 'rgba(255,255,255,0.96)',
              border: '1px solid rgba(0,0,0,0.1)',
              borderRadius: 6,
              boxShadow: tweaksOpen ? '0 8px 24px rgba(0,0,0,0.14)' : '0 4px 16px rgba(0,0,0,0.1)',
              fontFamily: '"JetBrains Mono", monospace',
              fontSize: 10,
              letterSpacing: '0.08em',
              textTransform: 'uppercase',
              color: '#555',
              cursor: 'pointer',
              display: 'flex',
              alignItems: 'center',
              gap: 8,
            }}
            aria-expanded={tweaksOpen}
            aria-label="Toggle theme picker"
          >
            <span style={{ width: 8, height: 8, borderRadius: 8, background: theme.accent }}/>
            Theme
          </button>

          {tweaksOpen && (
            <div className="tweaks-panel popover-grow" style={{ color: '#111' }}>
              <h3>Theme</h3>
              <div className="theme-grid">
                {Object.entries(window.LOCUS_THEMES).map(([key, t]) => (
                  <div key={key}>
                    <div
                      className="theme-swatch"
                      onClick={() => {
                        pickTheme(key);
                        setTweaksOpen(false);
                      }}
                      title={t.name}
                      style={{
                        background: t.bg,
                        border: themeKey === key ? '2px solid #111' : '2px solid rgba(0,0,0,0.08)',
                      }}
                    >
                      <div style={{
                        position: 'absolute', inset: 4,
                        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 2,
                      }}>
                        {t.funcPalette.slice(0, 3).map((c, i) => (
                          <div key={i} style={{ background: c, borderRadius: 2 }}/>
                        ))}
                      </div>
                    </div>
                    <div className="theme-swatch-label">{t.name}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
